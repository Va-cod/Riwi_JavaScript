<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="container">
        <div class="card">
            <h1>My Notes</h1>
            <p>What do you want to write today?</p>
            <form id="noteForm">
                <!-- Label for the input -->
                <label for="noteInput">Note:</label>
                <!-- Input for writing the note -->
                <input type="text" id="noteInput" name="note" placeholder="Write your note here...">
                <!-- Submit button -->
                <button type="submit" id="button">Add Note</button>
            </form>
        </div>
        <div class="card">
            <!--List to show the notes-->
            <h2>List</h2>
            <ul id="listNotes"></ul>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
